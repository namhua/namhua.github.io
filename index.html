<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hua Dai Nam (Nathan) — Analytics Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root {
    /* warm-leaning brown palette (default) */
    --bg: #FAF6EF;
    --surface: #F4ECE0;
    --surface-2: #EFE4D2;
    --border: #E5D9C7;
    --border-2: #D9C9AE;
    --ink: #2A2520;
    --ink-2: #4D4338;
    --ink-3: #7B6E5E;
    --ink-4: #A89A86;
    --accent: #8B5E34;
    --accent-soft: #B68B4C;
    --gold: #C9A961;
    --positive: #6E8B3D;

    --r-sm: 8px;
    --r: 12px;
    --r-lg: 18px;
    --r-xl: 24px;

    --space-section: clamp(80px, 10vw, 140px);
    --space-block: 32px;

    --font-display: "Geist", ui-sans-serif, system-ui, -apple-system, "SF Pro Display", sans-serif;
    --font-body: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SF Mono", monospace;
    --font-serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;

    --maxw: 1200px;
    --gutter: clamp(20px, 4vw, 48px);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 72px; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    letter-spacing: -0.005em;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; }

  .container {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 0 var(--gutter);
  }

  /* Sticky nav */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    border-bottom: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    letter-spacing: -0.01em;
    font-size: 14px;
  }
  .brand-mark {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border-2);
    overflow: hidden;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .brand-mark img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: 50% 15%;
    display: block;
    /* Line-art portrait: subtle warm shift so it doesn't read as pure black on cream */
    filter: contrast(0.9);
  }
  .nav-links {
    display: flex;
    gap: 28px;
    font-size: 13.5px;
    color: var(--ink-2);
  }
  .nav-links a {
    transition: color .2s;
    position: relative;
  }
  .nav-links a:hover { color: var(--ink); }

  .hamburger {
    display: none;
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: transparent;
    cursor: default;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  .hamburger:hover { background: var(--surface); }
  .hamburger-icon { width: 16px; height: 10px; position: relative; }
  .hamburger-icon span {
    position: absolute; left: 0; right: 0;
    height: 1.5px; background: var(--ink);
    transition: transform .25s, top .25s, opacity .15s;
  }
  .hamburger-icon span:nth-child(1) { top: 0; }
  .hamburger-icon span:nth-child(2) { top: 4.5px; }
  .hamburger-icon span:nth-child(3) { top: 9px; }
  .nav.menu-open .hamburger-icon span:nth-child(1) { top: 4.5px; transform: rotate(45deg); }
  .nav.menu-open .hamburger-icon span:nth-child(2) { opacity: 0; }
  .nav.menu-open .hamburger-icon span:nth-child(3) { top: 4.5px; transform: rotate(-45deg); }

  .mobile-menu {
    display: none;
    flex-direction: column;
    padding: 8px var(--gutter) 24px;
    gap: 4px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .mobile-menu a {
    padding: 14px 4px;
    font-size: 17px;
    border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
    color: var(--ink);
  }
  .mobile-menu a:last-of-type { border-bottom: none; }
  .mobile-menu .nav-cta { margin-top: 16px; align-self: flex-start; color: #FFFFFF; }
  .nav.menu-open .mobile-menu { display: flex; }

  @media (max-width: 820px) {
    .nav-links, .nav > .container .nav-cta { display: none; }
    .hamburger { display: flex; }
  }

  /* Sections — each owns its own top padding so anchor scroll + sticky nav
     never land mid-content. scroll-padding-top on <html> adds nav clearance. */
  section { padding: calc(var(--space-section) * 0.55) 0; position: relative; }
  .section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::before {
    content: "";
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 2px;
    transform: rotate(45deg);
  }
  .section-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(32px, 4.5vw, 52px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
    text-wrap: balance;
  }
  .section-title em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .section-lede {
    max-width: 620px;
    color: var(--ink-2);
    font-size: 17px;
    margin: 0 0 var(--space-block);
    text-wrap: pretty;
  }

  /* Reveal on scroll */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity .8s ease, transform .8s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 500;
    border: 1px solid transparent;
    transition: transform .2s, background .2s, box-shadow .2s, border-color .2s;
    cursor: default;
    white-space: nowrap;
  }
  .btn-primary { background: var(--ink); color: #FFFFFF; font-weight: 600; }
  .btn-primary svg, .btn-primary svg * { stroke-width: 2.4; }
  .btn-primary:hover { background: #1a1612; transform: translateY(-1px); box-shadow: 0 8px 24px -8px color-mix(in srgb, var(--ink) 55%, transparent); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--border-2); }
  .btn-ghost:hover { background: var(--surface); transform: translateY(-1px); }

  /* CV download — accent variant (gold glow ring) */
  .btn-cv {
    background: var(--ink) !important;
    color: #FFFFFF !important;
    border-color: transparent;
    box-shadow:
      0 0 0 1px color-mix(in srgb, var(--gold) 55%, transparent),
      0 0 0 4px color-mix(in srgb, var(--gold) 14%, transparent),
      0 8px 20px -8px color-mix(in srgb, var(--ink) 50%, transparent);
    position: relative;
    animation: cvPulse 3.2s cubic-bezier(.4, 0, .6, 1) infinite;
  }
  .btn-cv:hover {
    background: var(--accent) !important;
    color: #FFFFFF !important;
    transform: translateY(-1px);
    box-shadow:
      0 0 0 1px var(--gold),
      0 0 0 5px color-mix(in srgb, var(--gold) 22%, transparent),
      0 14px 30px -10px color-mix(in srgb, var(--accent) 65%, transparent);
    animation-play-state: paused;
  }
  @keyframes cvPulse {
    0%, 100% {
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--gold) 55%, transparent),
        0 0 0 4px color-mix(in srgb, var(--gold) 8%, transparent),
        0 8px 20px -8px color-mix(in srgb, var(--ink) 50%, transparent);
    }
    50% {
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--gold) 70%, transparent),
        0 0 0 8px color-mix(in srgb, var(--gold) 20%, transparent),
        0 8px 22px -6px color-mix(in srgb, var(--gold) 35%, transparent);
    }
  }
  .nav-cta {
    /* Solid darker accent + white text for crisp contrast at every scale */
    background: var(--accent);
    color: #FFFFFF !important;
    padding: 8px 14px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.005em;
    box-shadow:
      0 0 0 1px color-mix(in srgb, var(--gold) 35%, transparent),
      0 4px 12px -6px color-mix(in srgb, var(--accent) 60%, transparent);
    transition: transform .2s, box-shadow .2s, background .2s;
  }
  .nav-cta:hover {
    transform: translateY(-1px);
    background: #74491f;
    box-shadow:
      0 0 0 1px var(--gold),
      0 8px 20px -8px color-mix(in srgb, var(--accent) 70%, transparent);
  }
  .nav-cta svg { width: 12px; height: 12px; stroke-width: 2.4; }
  @media (prefers-reduced-motion: reduce) {
    .btn-cv { animation: none; }
  }
  .btn .arrow { transition: transform .2s; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* HERO */
  .hero { padding: 64px 0 var(--space-section); }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: clamp(32px, 6vw, 80px);
    align-items: center;
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px 6px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--ink-2);
    margin-bottom: 28px;
  }
  .hero-eyebrow .dot {
    width: 7px; height: 7px;
    background: var(--positive);
    border-radius: 50%;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--positive) 25%, transparent);
  }
  .hero h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(44px, 6.2vw, 86px);
    line-height: 0.98;
    letter-spacing: -0.035em;
    margin: 0 0 24px;
    text-wrap: balance;
  }
  .hero h1 em {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .hero-tagline {
    font-size: clamp(17px, 1.5vw, 19px);
    color: var(--ink-2);
    max-width: 480px;
    margin: 0 0 36px;
    line-height: 1.5;
    text-wrap: pretty;
  }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
  .hero-meta {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--ink-3);
    font-size: 12.5px;
    flex-wrap: wrap;
  }
  .hero-meta-item { display: flex; align-items: center; gap: 6px; }
  .hero-meta-item strong { color: var(--ink); font-weight: 500; }

  /* Hero visual — a sample dashboard (signals the kind of work I ship) */
  .hero-visual-wrap { display: flex; flex-direction: column; gap: 12px; }

  /* ─── HeroDashboard: title strip + KPI tiles + chart ─── */
  .hd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 16px 40px -24px color-mix(in srgb, var(--ink) 30%, transparent);
  }
  .hd-title {
    background: var(--ink);
    color: var(--bg);
    padding: 14px 20px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
  }
  .hd-title-name {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: -0.01em;
  }
  .hd-title-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: color-mix(in srgb, var(--bg) 65%, transparent);
    text-transform: uppercase;
  }
  .hd-title-meta strong {
    color: var(--gold);
    font-weight: 500;
  }

  .hd-kpis {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .hd-kpi {
    appearance: none;
    border: 0;
    background: var(--surface);
    padding: 14px 16px 12px;
    text-align: left;
    cursor: default;
    transition: background .2s;
    position: relative;
    font-family: var(--font-body);
    color: var(--ink);
  }
  .hd-kpi:hover { background: var(--surface-2); }
  .hd-kpi.active { background: var(--bg); }
  .hd-kpi.active::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: var(--accent);
  }
  .hd-kpi-name {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .hd-kpi-val {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .hd-kpi-val .u {
    color: var(--accent);
    font-size: 18px;
    margin-left: 1px;
  }
  .hd-kpi-delta {
    font-family: var(--font-mono);
    font-size: 10.5px;
    display: flex; align-items: center; gap: 4px;
    letter-spacing: 0;
  }
  .hd-kpi-delta.up   { color: #6E8B3D; }       /* warm green */
  .hd-kpi-delta.down { color: #B5553F; }       /* warm terracotta */
  .hd-kpi-delta .vs {
    color: var(--ink-4);
    font-size: 9.5px;
    margin-left: 4px;
  }

  .hd-chart-block { padding: 14px 16px 12px; background: var(--bg); }
  .hd-chart-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.05em;
  }
  .hd-chart-title {
    color: var(--ink-2);
    text-transform: uppercase;
  }
  .hd-chart-hint {
    color: var(--ink-4);
    font-size: 9.5px;
  }
  .hd-chart-wrap { position: relative; }
  .hd-chart-svg {
    width: 100%;
    height: 96px;
    display: block;
    cursor: crosshair;
  }
  .hd-tooltip {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -100%);
    margin-top: -8px;
    background: var(--ink);
    color: var(--bg);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    line-height: 1.2;
    white-space: nowrap;
    box-shadow: 0 8px 20px -8px rgba(0,0,0,.35);
    z-index: 2;
  }
  .hd-tooltip::after {
    content: "";
    position: absolute;
    left: 50%; bottom: -3px;
    width: 6px; height: 6px;
    background: var(--ink);
    transform: translateX(-50%) rotate(45deg);
  }
  .hd-tooltip .t-day {
    color: color-mix(in srgb, var(--bg) 60%, transparent);
    font-size: 9px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .hd-tooltip .t-val {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: -0.01em;
  }
  .hd-tooltip .t-val span {
    font-size: 10px;
    color: var(--gold);
    margin-left: 1px;
  }

  .hero-visual {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 22px 22px 20px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 16px 40px -24px color-mix(in srgb, var(--ink) 30%, transparent);
  }
  .hv-top {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .hv-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .hv-tag::before {
    content: "";
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }
  .hv-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border: 1px solid var(--border-2);
    border-radius: 999px;
    background: var(--bg);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-2);
  }
  .hv-pill .pulse {
    width: 6px; height: 6px;
    background: var(--positive);
    border-radius: 50%;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--positive) 25%, transparent);
    animation: hvPulse 2s ease-in-out infinite;
  }
  @keyframes hvPulse { 50% { opacity: .35; } }

  .hv-kpi-row { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
  .hv-kpi-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .hv-kpi-val {
    font-family: var(--font-display);
    font-size: clamp(30px, 3.6vw, 42px);
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .hv-kpi-val .accent { color: var(--accent); }
  .hv-delta {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 9px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--positive) 15%, transparent);
    color: var(--positive);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
  }
  .hv-delta svg { width: 10px; height: 10px; }

  .hv-chart-wrap { position: relative; margin-bottom: 14px; }
  .hv-chart-svg { width: 100%; height: 92px; display: block; }
  .hv-x {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--ink-4);
    margin-top: 6px;
    padding: 0 2px;
  }

  .hv-divider { height: 1px; background: var(--border); margin: 4px 0 14px; }

  .hv-breakdown { display: flex; flex-direction: column; gap: 9px; }
  .hv-bd-head {
    display: flex; justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 2px;
  }
  .hv-bd-row {
    display: grid;
    grid-template-columns: 70px 1fr 56px;
    gap: 14px;
    align-items: center;
    font-size: 12px;
  }
  .hv-bd-row .name { color: var(--ink); }
  .hv-bd-row .val { font-family: var(--font-mono); color: var(--ink-2); text-align: right; }
  .hv-bd-row .bar {
    height: 6px;
    background: color-mix(in srgb, var(--border) 80%, transparent);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .hv-bd-row .bar::after {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: var(--w, 50%);
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 999px;
  }
  .hv-bd-row.accent .bar::after { background: var(--accent); }

  .hv-caption {
    font-size: 12px;
    color: var(--ink-3);
    text-align: center;
    line-height: 1.4;
    margin-top: 4px;
  }
  .hv-caption em { font-family: var(--font-serif); font-style: italic; color: var(--ink-2); }

  /* ABOUT */
  .about-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 64px;
    align-items: start;
  }
  .about-prose p {
    font-size: 19px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0 0 22px;
    max-width: 540px;
    text-wrap: pretty;
  }
  .about-prose p:first-of-type { color: var(--ink); font-size: 22px; line-height: 1.45; }
  .about-prose .pull {
    font-family: var(--font-serif);
    font-size: 28px;
    line-height: 1.3;
    color: var(--accent);
    font-style: italic;
  }
  .about-highlights {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .highlight {
    padding: 22px 20px;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--surface);
    transition: transform .25s, border-color .25s, background .25s;
  }
  .highlight:hover { transform: translateY(-2px); border-color: var(--border-2); background: var(--surface-2); }
  .highlight .num {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .highlight .num .suffix { color: var(--accent); }
  .highlight .lbl { font-size: 12.5px; color: var(--ink-3); line-height: 1.45; }

  /* SKILLS — compact index layout */
  .skills-table {
    border-top: 1px solid var(--border);
  }
  .skill-row {
    display: grid;
    grid-template-columns: minmax(220px, 280px) 1fr;
    gap: 32px;
    padding: 22px 4px;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
  }
  .skill-row-label {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .skill-row-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
  }
  .skill-row-label h3 {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
    margin: 0;
  }
  .skill-row-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 8px;
  }
  .tag {
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--ink-2);
    font-family: var(--font-mono);
    letter-spacing: -0.01em;
    transition: border-color .2s, color .2s, background .2s;
  }
  .skill-row:hover .tag { border-color: var(--border-2); }
  .tag:hover { color: var(--accent); border-color: var(--accent); }
  @media (max-width: 680px) {
    .skill-row {
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 18px 0;
    }
  }

  /* SKILLS — accordion layout */
  .skills-acc { border-top: 1px solid var(--border); margin-top: 28px; }
  .skill-acc-item { border-bottom: 1px solid var(--border); }
  .skill-acc-trigger {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 14px 4px; padding-right: 0;
    background: none; border: none; cursor: pointer; text-align: left;
    border-radius: 0;
    transition: background .15s, padding-left .2s;
  }
  .skill-acc-trigger:hover { background: color-mix(in srgb,var(--surface) 60%,transparent); padding-left: 10px; }
  .skill-acc-num {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-3); letter-spacing: 0.08em; min-width: 26px;
  }
  .skill-acc-name {
    flex: 1; font-size: 15px; font-weight: 500;
    color: var(--ink); letter-spacing: -0.005em;
  }
  .skill-acc-count {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px 8px; line-height: 1.6;
  }
  .skill-acc-chevron {
    color: var(--ink-3); flex-shrink: 0;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .skill-acc-item.open .skill-acc-chevron { transform: rotate(90deg); }
  /* grid trick for smooth height animation without fixed max-height */
  .skill-acc-body {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows .28s cubic-bezier(.4,0,.2,1);
  }
  .skill-acc-item.open .skill-acc-body { grid-template-rows: 1fr; }
  .skill-acc-body-inner { overflow: hidden; padding-bottom: 0; transition: padding-bottom .28s ease; }
  .skill-acc-item.open .skill-acc-body-inner { padding-bottom: 14px; }
  .skill-acc-tags { display: flex; flex-wrap: wrap; gap: 6px 8px; padding-left: 40px; }
  .skill-acc-item.open .tag { border-color: var(--border-2); }

  /* PROJECTS */
  .projects-head {
    display: flex;
    align-items: end;
    justify-content: space-between;
    margin-bottom: var(--space-block);
    gap: 24px;
    flex-wrap: wrap;
  }
  .projects-head .left { max-width: 620px; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink-2);
    font-size: 13px;
    cursor: default;
    transition: all .2s;
  }
  .filter-btn:hover { background: var(--surface); }
  .filter-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .filter-btn .count {
    margin-left: 6px; font-family: var(--font-mono); font-size: 11px;
    color: color-mix(in srgb, currentColor 55%, transparent);
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .project-card {
    padding: 28px;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--surface);
    transition: transform .3s cubic-bezier(.2,.7,.2,1), border-color .3s, background .3s, box-shadow .3s;
    display: flex;
    flex-direction: column;
    min-height: 320px;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .project-card:hover {
    transform: translateY(-3px);
    border-color: var(--border-2);
    background: var(--surface-2);
    box-shadow: 0 12px 32px -16px color-mix(in srgb, var(--ink) 25%, transparent);
  }
  .project-card.filtering { opacity: 0; transform: scale(.97); pointer-events: none; }
  .project-card { animation: pcIn .5s cubic-bezier(.2,.7,.2,1) backwards; }
  .project-card:nth-child(2) { animation-delay: 50ms; }
  .project-card:nth-child(3) { animation-delay: 100ms; }
  .project-card:nth-child(4) { animation-delay: 150ms; }
  .project-card:nth-child(5) { animation-delay: 200ms; }
  .project-card:nth-child(6) { animation-delay: 250ms; }
  @keyframes pcIn { from { opacity: 0; transform: translateY(10px); } }
  .project-card.has-detail .pc-num { display: none; }
  .pc-detail-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .pc-detail-badge .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .pc-head {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 16px;
  }
  .pc-cat {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .pc-num {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-4);
  }
  .pc-title {
    font-size: 22px;
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.015em;
    margin: 0 0 10px;
  }
  .pc-desc {
    color: var(--ink-2);
    font-size: 14px;
    line-height: 1.5;
    margin: 0 0 20px;
    flex: 1;
  }
  .pc-impact {
    display: flex;
    gap: 20px;
    padding: 14px 0;
    border-top: 1px solid var(--border);
    margin-top: auto;
    margin-bottom: 14px;
  }
  .pc-impact .stat .v {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--accent);
    line-height: 1;
  }
  .pc-impact .stat .l {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 4px;
  }
  .pc-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pc-stack { display: flex; gap: 6px; flex-wrap: wrap; }
  .pc-stack .tag { font-size: 11px; padding: 3px 8px; background: transparent; }
  .pc-view {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .pc-view .arrow { transition: transform .2s; }
  .project-card:hover .pc-view .arrow { transform: translateX(3px); }

  /* EXPERIENCE */
  .timeline {
    position: relative;
    padding-left: 28px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 6px; top: 6px; bottom: 6px;
    width: 1px;
    background: var(--border);
  }
  .tl-item {
    position: relative;
    padding: 0 0 36px;
  }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-item::before {
    content: "";
    position: absolute;
    left: -28px; top: 8px;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--border-2);
  }
  .tl-item.current::before {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .tl-date {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-3);
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  .tl-role {
    font-size: 19px;
    font-weight: 500;
    margin: 0 0 2px;
    letter-spacing: -0.015em;
  }
  .tl-co {
    font-size: 14px;
    color: var(--ink-2);
    margin-bottom: 12px;
  }
  .tl-co .dot { color: var(--ink-4); margin: 0 6px; }
  .tl-desc {
    color: var(--ink-2);
    font-size: 14.5px;
    line-height: 1.55;
    margin: 0 0 12px;
    max-width: 620px;
  }
  .tl-bullets {
    list-style: none;
    padding: 0; margin: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .tl-bullets li {
    font-size: 13.5px;
    color: var(--ink-2);
    padding-left: 18px;
    position: relative;
    line-height: 1.5;
  }
  .tl-bullets li::before {
    content: "→";
    position: absolute; left: 0;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
  }

  /* ─── Experience (compact list) ─── */
  .xp-list {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--border);
  }
  .xp-row {
    display: grid;
    grid-template-columns: 200px 1fr auto;
    gap: 24px;
    padding: 20px 4px;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
    transition: background .2s, padding-left .25s;
    position: relative;
  }
  .xp-row:hover { background: color-mix(in srgb, var(--surface) 50%, transparent); padding-left: 12px; }
  .xp-row.current::before {
    content: "";
    position: absolute;
    left: -16px; top: 50%; transform: translateY(-50%);
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .xp-date {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-3);
    letter-spacing: 0.02em;
  }
  .xp-main { display: flex; flex-direction: column; gap: 2px; }
  .xp-role {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .xp-co {
    font-size: 14px;
    color: var(--ink-2);
  }
  .xp-loc {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-4);
    text-align: right;
    letter-spacing: 0.02em;
  }
  .xp-pin {
    position: absolute;
    top: 16px; right: 0;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  @media (max-width: 720px) {
    .xp-row { grid-template-columns: 1fr; gap: 4px; padding: 18px 4px; }
    .xp-row.current::before { left: -10px; }
    .xp-loc { text-align: left; margin-top: 4px; }
    .xp-pin { position: static; margin-top: 4px; }
  }
  .case {
    background: var(--ink);
    color: var(--bg);
    border-radius: var(--r-xl);
    padding: clamp(28px, 3.5vw, 48px);
    position: relative;
    overflow: hidden;
  }
  .case .section-label { color: color-mix(in srgb, var(--bg) 60%, transparent); }
  .case .section-label::before { background: var(--gold); }
  .case h2 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(28px, 3.5vw, 42px);
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin: 0 0 12px;
    color: var(--bg);
    text-wrap: balance;
  }
  .case h2 em {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }
  .case-lede {
    color: color-mix(in srgb, var(--bg) 72%, transparent);
    max-width: 580px;
    font-size: 15px;
    margin: 0 0 24px;
  }
  .case-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }
  .case-step {
    padding: 22px;
    border: 1px solid color-mix(in srgb, var(--bg) 14%, transparent);
    border-radius: var(--r);
    background: color-mix(in srgb, var(--bg) 4%, transparent);
  }
  .case-step .k {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .case-step h4 {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 8px;
    color: var(--bg);
  }
  .case-step p {
    font-size: 13.5px;
    color: color-mix(in srgb, var(--bg) 70%, transparent);
    margin: 0;
    line-height: 1.5;
  }
  .case-impact {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    padding: 20px 0 0;
    border-top: 1px solid color-mix(in srgb, var(--bg) 14%, transparent);
  }
  .case-impact .stat { padding: 0 20px; border-left: 1px solid color-mix(in srgb, var(--bg) 10%, transparent); }
  .case-impact .stat:first-child { border-left: none; padding-left: 0; }
  .case-impact .stat .v {
    font-family: var(--font-display);
    font-size: clamp(22px, 2.4vw, 30px);
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1;
    color: var(--bg);
  }
  .case-impact .stat .v em {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }
  .case-impact .stat .l {
    font-size: 11.5px;
    color: color-mix(in srgb, var(--bg) 60%, transparent);
    margin-top: 6px;
  }

  /* Pipeline visual */
  .pipeline {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    align-items: center;
    margin: 28px 0 32px;
    padding: 28px 24px;
    border: 1px solid color-mix(in srgb, var(--bg) 14%, transparent);
    border-radius: var(--r);
    background: color-mix(in srgb, var(--bg) 4%, transparent);
  }
  .pipe-node {
    padding: 14px 12px;
    border: 1px solid color-mix(in srgb, var(--bg) 18%, transparent);
    border-radius: 8px;
    text-align: center;
    background: color-mix(in srgb, var(--ink) 70%, transparent);
    position: relative;
  }
  .pipe-node .t {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.08em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .pipe-node .n {
    font-size: 13px;
    font-weight: 500;
    color: var(--bg);
  }
  .pipe-arrow {
    text-align: center;
    color: color-mix(in srgb, var(--bg) 40%, transparent);
    font-family: var(--font-mono);
    font-size: 14px;
  }

  /* ─── KPI forecasting workflow animation ─── */
  /* Light shell — matches the rest of the sheet on cream surface */
  .kpi-case-shell {
    background: var(--surface);
    color: var(--ink);
    padding: 24px 20px 20px;
    border-radius: var(--r-lg);
    border: 1px solid var(--border);
    margin-top: 8px;
  }
  .kpi-flow {
    margin: 8px 0 4px;
    padding: 18px 16px 16px;
    border: 1px solid var(--border);
    border-radius: var(--r);
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .kpi-flow-pulse {
    position: absolute;
    inset: 0;
    background: radial-gradient(800px circle at var(--mx, 30%) 50%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%);
    opacity: 0;
    animation: kpiPulseSweep 12s linear infinite;
    pointer-events: none;
  }
  @keyframes kpiPulseSweep {
    0%   { --mx: 0%;   opacity: 0; }
    8%   { opacity: .9; }
    50%  { --mx: 100%; opacity: .9; }
    58%  { opacity: 0; }
    100% { --mx: 0%;   opacity: 0; }
  }
  .kpi-flow-stages {
    display: grid;
    grid-template-columns: 1fr 18px 1fr 18px 1fr 18px 1fr 18px 1fr 18px 1fr;
    gap: 0;
    align-items: stretch;
    position: relative;
  }
  .kpi-stage {
    padding: 14px 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    display: flex; flex-direction: column; gap: 4px;
    align-items: stretch;
    position: relative;
    transition: border-color .3s, box-shadow .3s, transform .3s, background .3s;
    animation: kpiStageActive 12s cubic-bezier(.5,0,.5,1) infinite;
    animation-delay: calc(var(--i) * 2s);
  }
  @keyframes kpiStageActive {
    0%, 6%    { border-color: var(--border); box-shadow: none; transform: translateY(0); background: var(--surface); }
    10%, 18%  { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent), 0 12px 28px -16px color-mix(in srgb, var(--accent) 45%, transparent); transform: translateY(-3px); background: var(--bg); }
    24%, 100% { border-color: var(--border); box-shadow: none; transform: translateY(0); background: var(--surface); }
  }

  .ks-num {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .ks-anim {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 64px;
    margin: 4px auto 2px;
    color: var(--ink-3);
    transition: color .3s;
  }
  .ks-anim svg { width: 100%; height: 100%; display: block; }
  .kpi-stage .ks-anim { animation: ksAnimActive 12s cubic-bezier(.5,0,.5,1) infinite; animation-delay: calc(var(--i) * 2s); }
  @keyframes ksAnimActive {
    0%, 8% { color: var(--ink-3); }
    10%, 20% { color: var(--ink); }
    24%, 100% { color: var(--ink-3); }
  }

  .ks-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
    margin-top: 2px;
  }
  .ks-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.01em;
    line-height: 1.3;
  }

  /* ─── Per-stage micro-animations ─── */
  /* 01 Collect — rows fading in */
  .kp-collect-rows .r { opacity: 0; animation: rowAppear 3s ease-in-out infinite; }
  .kp-collect-rows .r1 { animation-delay: 0s; }
  .kp-collect-rows .r2 { animation-delay: 0.55s; }
  .kp-collect-rows .r3 { animation-delay: 1.1s; }
  @keyframes rowAppear {
    0%, 5% { opacity: 0; transform: translateY(-3px); }
    20%, 75% { opacity: 1; transform: none; }
    90%, 100% { opacity: 0; transform: translateY(2px); }
  }

  /* 02 Normalize — hierarchy cascade */
  .kp-norm-node {
    opacity: 0;
    transform-origin: center;
    animation: normCascade 3s ease-out infinite;
  }
  .kp-norm-node.l0 { animation-delay: 0s; }
  .kp-norm-node.l1 { animation-delay: 0.35s; }
  .kp-norm-node.l2 { animation-delay: 0.7s; }
  .kp-norm-node.l3 { animation-delay: 1.05s; }
  .kp-norm-edges { opacity: 0; animation: normEdges 3s ease-out infinite; }
  .kp-norm-edges.l3-edges { animation-delay: 0.9s; }
  .kp-norm-edges:not(.l3-edges) { animation-delay: 0.2s; }
  @keyframes normCascade {
    0%, 8% { opacity: 0; transform: translateY(-3px) scale(0.85); }
    20%, 75% { opacity: 1; transform: translateY(0) scale(1); }
    92%, 100% { opacity: 0; transform: translateY(2px); }
  }
  @keyframes normEdges {
    0%, 8% { opacity: 0; }
    20%, 75% { opacity: 0.8; }
    92%, 100% { opacity: 0; }
  }

  /* 03 Pattern — active wave breathing */
  .kp-pattern-active { stroke-dasharray: 120; stroke-dashoffset: 0; animation: patBreathe 3s ease-in-out infinite; }
  @keyframes patBreathe {
    0%, 100% { opacity: 0.4; stroke-dashoffset: 120; }
    40%, 70% { opacity: 1;   stroke-dashoffset: 0; }
  }

  /* 04 KNN — query pulse + neighbor lines flicker */
  .kp-knn-q { transform-origin: 32px 32px; animation: knnPulse 1.8s ease-in-out infinite; }
  @keyframes knnPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.35); opacity: 0.7; } }
  .kp-knn-lines line { stroke-dasharray: 32; stroke-dashoffset: 32; animation: knnLine 3s ease-in-out infinite; }
  .kp-knn-lines line:nth-child(1) { animation-delay: 0s; }
  .kp-knn-lines line:nth-child(2) { animation-delay: 0.4s; }
  .kp-knn-lines line:nth-child(3) { animation-delay: 0.8s; }
  @keyframes knnLine {
    0%, 8% { stroke-dashoffset: 32; opacity: 0; }
    25%, 65% { stroke-dashoffset: 0; opacity: 1; }
    85%, 100% { stroke-dashoffset: 32; opacity: 0; }
  }

  /* 05 Forecast — projection drawing */
  .kp-fc-pred { stroke-dasharray: 60; stroke-dashoffset: 60; animation: fcDraw 3.5s cubic-bezier(.2,.7,.2,1) infinite; }
  @keyframes fcDraw {
    0%, 5% { stroke-dashoffset: 60; }
    40%, 75% { stroke-dashoffset: 0; }
    90%, 100% { stroke-dashoffset: 60; }
  }
  .kp-fc-target { transform-origin: 56px 8px; animation: fcTarget 3.5s cubic-bezier(.2,.7,.2,1) infinite; }
  @keyframes fcTarget {
    0%, 50% { opacity: 0; transform: scale(0.5); }
    70%, 85% { opacity: 1; transform: scale(1); }
    95%, 100% { opacity: 0; transform: scale(0.5); }
  }

  /* 06 Calibrate — slider thumbs */
  .kp-cal-thumb { animation: calSlide 3.5s ease-in-out infinite; }
  .kp-cal-thumb-2 { animation: calSlide2 3.5s ease-in-out infinite; animation-delay: 1s; }
  @keyframes calSlide  { 0%, 100% { transform: translateX(14px); } 50% { transform: translateX(46px); } }
  @keyframes calSlide2 { 0%, 100% { transform: translateX(30px); } 50% { transform: translateX(22px); } }

  .kpi-conn {
    position: relative;
    align-self: center;
    height: 14px;
    color: var(--ink-4);
    overflow: visible;
  }
  .kpi-conn svg { width: 100%; height: 100%; display: block; }
  .kpi-conn .kpi-dot {
    position: absolute;
    top: 50%; left: 0;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent), 0 0 12px color-mix(in srgb, var(--accent) 50%, transparent);
    opacity: 0;
    animation: kpiDotTravel 12s cubic-bezier(.55, 0, .45, 1) infinite;
    animation-delay: calc(var(--i) * 2s);
  }
  @keyframes kpiDotTravel {
    0%   { left: 0%;   opacity: 0; }
    8%   { left: 0%;   opacity: 1; }
    18%  { left: 100%; opacity: 1; }
    22%, 100% { left: 100%; opacity: 0; }
  }

  /* Mobile / tablet: stack vertically */
  @media (max-width: 820px) {
    .kpi-flow-stages {
      grid-template-columns: 1fr;
      gap: 0;
    }
    .kpi-conn {
      width: 100%;
      height: 28px;
    }
    .kpi-conn svg {
      transform: rotate(90deg);
      width: 28px;
      height: 100%;
      margin: 0 auto;
    }
    .kpi-conn .kpi-dot {
      top: 0; left: 50%;
      animation: kpiDotTravelV 12s cubic-bezier(.55, 0, .45, 1) infinite;
      animation-delay: calc(var(--i) * 2s);
    }
    @keyframes kpiDotTravelV {
      0%   { top: 0%;   opacity: 0; }
      8%   { top: 0%;   opacity: 1; }
      18%  { top: 100%; opacity: 1; }
      22%, 100% { top: 100%; opacity: 0; }
    }
    .kpi-stage { padding: 14px; flex-direction: row; align-items: center; gap: 14px; flex-wrap: wrap; }
    .kpi-stage .ks-anim { width: 56px; height: 56px; flex-shrink: 0; margin: 0; }
    .kpi-stage .ks-num { position: absolute; top: 10px; right: 12px; }
    .ks-title, .ks-sub { flex-basis: calc(100% - 80px); }
  }
  /* Reduce-motion: hold each stage in its non-active state */
  @media (prefers-reduced-motion: reduce) {
    .kpi-flow-pulse, .kpi-stage, .kpi-stage .ks-anim, .kpi-conn .kpi-dot,
    .kp-collect-rows .r, .kp-norm-node, .kp-norm-edges, .kp-pattern-active,
    .kp-knn-q, .kp-knn-lines line, .kp-fc-pred, .kp-fc-target,
    .kp-cal-thumb, .kp-cal-thumb-2 { animation: none !important; }
    .kpi-stage { border-color: var(--border); }
    .kp-collect-rows .r, .kp-pattern-active, .kp-norm-node, .kp-norm-edges { opacity: 1; }
  }

  /* CERTS / EDUCATION */
  .certs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .cert-card {
    padding: 22px 24px;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--surface);
    display: flex;
    gap: 18px;
    align-items: start;
    transition: border-color .25s, background .25s;
  }
  .cert-card:hover { border-color: var(--border-2); background: var(--surface-2); }
  .cert-card .badge {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: grid; place-items: center;
    color: var(--accent);
    flex-shrink: 0;
  }
  .cert-card h4 {
    font-size: 15px;
    font-weight: 500;
    margin: 0 0 2px;
    letter-spacing: -0.005em;
  }
  .cert-card .org {
    font-size: 13px;
    color: var(--ink-3);
  }
  .cert-card .yr {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 6px;
  }

  /* CONTACT */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
  }
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .field input, .field textarea {
    font: inherit;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--ink);
    transition: border-color .2s, background .2s;
    resize: none;
  }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
  }
  .field textarea { min-height: 120px; }
  .field.err input, .field.err textarea { border-color: #B45A45; }
  .field .err-msg { font-size: 12px; color: #B45A45; }

  .contact-form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .contact-form button[type="submit"] { align-self: start; margin-top: 4px; }

  .contact-info { display: flex; flex-direction: column; gap: 28px; }
  .contact-info h3 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 28px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0;
    text-wrap: balance;
  }
  .contact-info h3 em { font-family: var(--font-serif); font-style: italic; color: var(--accent); font-weight: 400; }
  .contact-info p {
    color: var(--ink-2); font-size: 15px; line-height: 1.55; margin: 0; max-width: 380px;
  }
  .contact-links { display: flex; flex-direction: column; gap: 2px; }
  .contact-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    border-top: 1px solid var(--border);
    font-size: 15px;
    color: var(--ink);
    transition: color .2s, padding-left .25s;
  }
  .contact-link:last-child { border-bottom: 1px solid var(--border); }
  .contact-link:hover { color: var(--accent); padding-left: 6px; }
  .contact-link .l { display: flex; align-items: center; gap: 12px; }
  .contact-link .l .k {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-4);
    text-transform: uppercase;
    width: 52px;
  }
  .contact-link .arrow { color: var(--ink-4); transition: transform .2s, color .2s; }
  .contact-link:hover .arrow { transform: translateX(3px); color: var(--accent); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px 0 56px;
    font-size: 13px;
    color: var(--ink-3);
  }
  .footer-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translate(-50%, 100px);
    background: var(--ink);
    color: var(--bg);
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13.5px;
    box-shadow: 0 12px 32px -8px color-mix(in srgb, var(--ink) 50%, transparent);
    opacity: 0;
    transition: transform .35s cubic-bezier(.2,.7,.2,1), opacity .25s;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.in { opacity: 1; transform: translate(-50%, 0); }
  .toast .check { color: var(--gold); }
  .contact-send-err {
    margin: 8px 0 0;
    font-size: 13px;
    color: #c0392b;
    font-family: var(--font-mono);
  }

  /* Density variants */
  body[data-density="airy"] { --space-section: clamp(120px, 13vw, 180px); --space-block: 48px; }
  body[data-density="compact"] { --space-section: clamp(56px, 7vw, 80px); --space-block: 20px; }

  /* Skill tag icon (legacy — kept for project stack tags) */
  .tag.with-ico { display: inline-flex; align-items: center; gap: 6px; padding-left: 8px; }
  .tag.with-ico svg { width: 12px; height: 12px; flex-shrink: 0; color: var(--accent); }

  /* ─── Project detail sheet ─── */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: color-mix(in srgb, var(--ink) 55%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    opacity: 0;
    transition: opacity .35s ease;
    overflow-y: auto;
    padding: 32px 16px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .sheet-backdrop.in { opacity: 1; }
  .sheet {
    background: var(--bg);
    width: 100%;
    max-width: 980px;
    border-radius: var(--r-xl);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 32px 80px -20px rgba(0,0,0,.35);
    transform: translateY(20px);
    transition: transform .45s cubic-bezier(.2,.7,.2,1);
    position: relative;
  }
  .sheet-backdrop.in .sheet { transform: none; }

  .sheet-close {
    position: absolute;
    top: 18px; right: 18px;
    width: 36px; height: 36px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink-2);
    display: grid; place-items: center;
    cursor: default;
    z-index: 2;
    transition: background .2s, color .2s, transform .2s;
  }
  .sheet-close:hover { background: var(--ink); color: var(--bg); transform: rotate(90deg); }

  .sheet-hero {
    padding: 56px 56px 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .sheet-eyebrow {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 16px;
  }
  .sheet-eyebrow .sep { color: var(--ink-4); }
  .sheet-hero h2 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(28px, 3.6vw, 42px);
    line-height: 1.08;
    letter-spacing: -0.025em;
    margin: 0 0 16px;
    text-wrap: balance;
  }
  .sheet-hero h2 em { font-family: var(--font-serif); font-style: italic; color: var(--accent); font-weight: 400; }
  .sheet-hero p {
    font-size: 17px;
    color: var(--ink-2);
    max-width: 640px;
    margin: 0;
    line-height: 1.5;
  }
  .sheet-meta {
    display: flex;
    gap: 28px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .sheet-meta-item .k {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .sheet-meta-item .v { font-size: 14px; color: var(--ink); font-weight: 500; }

  .sheet-body { padding: 56px; display: flex; flex-direction: column; gap: 56px; }
  .sheet-block { display: flex; flex-direction: column; gap: 14px; }
  .sheet-block-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .sheet-block h3 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 24px;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin: 0;
    text-wrap: balance;
  }
  .sheet-block p {
    margin: 0;
    font-size: 15.5px;
    color: var(--ink-2);
    line-height: 1.6;
    max-width: 720px;
  }

  /* Timetable grid (GA Scheduler detail) + cohort heatmap share .cohort-card / .curve-card chrome */
  .cohort-card, .tt-card {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--surface);
    padding: 28px;
    overflow-x: auto;
  }
  .cohort-card .legend {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em;
  }
  .legend-scale { display: flex; align-items: center; gap: 6px; }
  .legend-scale .swatch { width: 14px; height: 10px; border-radius: 2px; }
  .legend-scale span { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); letter-spacing: 0; text-transform: none; }
  .cohort-table {
    display: grid;
    grid-template-columns: 110px repeat(10, 1fr);
    gap: 3px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    min-width: 600px;
  }
  .cohort-table .h {
    color: var(--ink-3);
    padding: 4px 0;
    text-align: center;
    letter-spacing: 0.04em;
  }
  .cohort-table .h.left { text-align: left; padding-left: 8px; }
  .cohort-table .row-label {
    padding: 6px 8px;
    color: var(--ink-2);
    display: flex; align-items: center;
    font-size: 11px;
  }
  .cohort-cell {
    aspect-ratio: 1.6 / 1;
    border-radius: 3px;
    display: grid; place-items: center;
    color: var(--bg);
    font-size: 10px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .cohort-cell.empty { background: color-mix(in srgb, var(--border) 50%, transparent); color: transparent; }

  /* ─── Timetable grid (GA Scheduler) ─── */
  .tt-grid {
    display: grid;
    gap: 4px;
    min-width: 520px;
  }
  .tt-corner, .tt-head, .tt-time {
    font-family: var(--font-mono);
    color: var(--ink-3);
  }
  .tt-corner { /* empty top-left */ }
  .tt-head {
    text-align: center;
    padding: 6px 0;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .tt-time {
    padding: 8px 6px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
  }
  .tt-time-label { font-size: 11.5px; color: var(--ink-2); font-weight: 500; }
  .tt-time-clock { font-size: 9.5px; color: var(--ink-4); letter-spacing: 0; }
  .tt-cell {
    padding: 12px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--bg);
    text-align: center;
    font-family: var(--font-display);
    letter-spacing: 0.01em;
    display: grid; place-items: center;
    min-height: 38px;
    animation: ttCellIn .5s cubic-bezier(.2,.7,.2,1) backwards;
  }
  .tt-cell.free {
    background: transparent;
    color: var(--ink-4);
    border: 1px dashed var(--border-2);
    font-family: var(--font-mono);
  }
  .tt-grid > .tt-cell:nth-child(7n+0)  { animation-delay: 0.00s; }
  .tt-grid > .tt-cell:nth-child(7n+1)  { animation-delay: 0.05s; }
  .tt-grid > .tt-cell:nth-child(7n+2)  { animation-delay: 0.10s; }
  .tt-grid > .tt-cell:nth-child(7n+3)  { animation-delay: 0.15s; }
  .tt-grid > .tt-cell:nth-child(7n+4)  { animation-delay: 0.20s; }
  .tt-grid > .tt-cell:nth-child(7n+5)  { animation-delay: 0.25s; }
  .tt-grid > .tt-cell:nth-child(7n+6)  { animation-delay: 0.30s; }
  @keyframes ttCellIn { from { opacity: 0; transform: translateY(4px); } }

  .tt-legend {
    margin-top: 18px;
    display: flex; flex-wrap: wrap; gap: 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
  }
  .tt-leg-item { display: inline-flex; align-items: center; gap: 6px; }
  .tt-leg-sw { width: 14px; height: 10px; border-radius: 2px; }

  /* Retention curves */
  .curve-card {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--surface);
    padding: 28px;
  }
  .curve-head {
    display: flex; justify-content: space-between; align-items: start;
    margin-bottom: 24px;
    flex-wrap: wrap; gap: 12px;
  }
  .curve-head h4 {
    font-size: 16px; font-weight: 500; margin: 0; letter-spacing: -0.005em;
  }
  .curve-head .sub {
    font-size: 12px; color: var(--ink-3); margin-top: 4px;
  }
  .curve-legend { display: flex; gap: 14px; font-size: 11.5px; color: var(--ink-2); font-family: var(--font-mono); }
  .curve-legend .item { display: flex; align-items: center; gap: 6px; }
  .curve-legend .item::before {
    content: ""; width: 12px; height: 2px; background: var(--c, var(--accent)); border-radius: 1px;
  }
  .curve-svg { width: 100%; height: 240px; display: block; }
  .curve-annotate {
    display: flex;
    gap: 12px;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .curve-annotate strong { color: var(--accent); font-weight: 500; }

  /* Findings */
  .findings {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .finding {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--surface);
    padding: 24px;
  }
  .finding .k {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .finding h5 {
    font-size: 15px; font-weight: 500; margin: 0 0 8px;
    letter-spacing: -0.005em;
  }
  .finding p {
    margin: 0; font-size: 13px; color: var(--ink-2); line-height: 1.55;
  }

  /* Sheet impact strip */
  .sheet-impact {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    padding: 32px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .sheet-impact .stat { padding: 0 24px; border-left: 1px solid var(--border); }
  .sheet-impact .stat:first-child { border-left: none; padding-left: 0; }
  .sheet-impact .stat .v {
    font-family: var(--font-display);
    font-size: 28px; font-weight: 500;
    letter-spacing: -0.025em; line-height: 1;
    color: var(--accent);
  }
  .sheet-impact .stat .v em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
  .sheet-impact .stat .l { font-size: 12px; color: var(--ink-3); margin-top: 8px; line-height: 1.4; }

  .sheet-stack { display: flex; flex-wrap: wrap; gap: 6px; }

  /* ─── Dashboard gallery sheet (project 02) ─── */
  .dash-exhibit {
    display: flex; flex-direction: column; gap: 16px;
    padding-top: 8px;
  }
  .dash-exhibit + .dash-exhibit { margin-top: 12px; }
  .dash-exhibit-cap {
    display: flex; gap: 16px; align-items: baseline;
  }
  .dash-exhibit-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    padding-top: 6px;
    min-width: 24px;
  }
  .dash-exhibit-cap h4 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    margin: 0 0 4px;
    letter-spacing: -0.015em;

  }
  .dash-exhibit-cap p {
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-2);

  }

  .dash-frame {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--bg);
    overflow: hidden;
    box-shadow: 0 1px 0 var(--surface) inset, 0 12px 32px -24px color-mix(in srgb, var(--ink) 30%, transparent);
  }
  .df-chrome {

  .df-chrome-l { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .df-mark {

    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent);
  }
  .df-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 13px;
    color: var(--ink);

  .df-status {

  .df-filter {
