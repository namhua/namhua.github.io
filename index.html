  .df-body { padding: 20px 18px; }

  /* shared delta token */
  .dx-delta {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 2px;
  }

  /* ── Exhibit 01: variable cost — 4×2 tile grid ── */
  .exh-tile-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .exh-tile {
    background: var(--bg);
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
    min-width: 0;
  }
  .exh-tile-k {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    letter-spacing: 0.02em;
  }
  .exh-tile-v {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .exh-tile-d {
    display: flex; align-items: baseline; gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
  }
  .exh-tile-spark { margin-top: 4px; opacity: 0.9; }

  /* ── Exhibit 02: cohort heatmap ── */
  .exh-cohort-wrap {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 18px;
    align-items: start;
  }
  .exh-cohort-side {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    background: var(--surface);
    display: flex; flex-direction: column; gap: 8px;
  }
  .exh-cohort-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .exh-cohort-filter { font-family: var(--font-mono); font-size: 11px; line-height: 1.3; }
  .exh-cohort-filter .k { color: var(--ink-3); }
  .exh-cohort-filter .v { color: var(--ink); font-weight: 500; }
  .exh-cohort-table {
    display: flex; flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    background: var(--surface);
    min-width: 720px;
  }
  .exh-cohort-row {
    display: grid;
    grid-template-columns: 70px repeat(12, 1fr);
  }
  .exh-cohort-head { background: var(--accent); }
  .exh-cohort-head .exh-cohort-rowhead,
  .exh-cohort-head .exh-cohort-cell {
    color: var(--bg);
    font-weight: 500;
    background: var(--accent);
  }
  .exh-cohort-rowhead {
    padding: 6px 8px;
    background: var(--surface);
    color: var(--ink-2);
    font-weight: 500;
    border-right: 1px solid var(--border);
    display: flex; align-items: center;
  }
  .exh-cohort-cell {
    padding: 6px 4px;
    text-align: center;
    border-right: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
    border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
    color: var(--ink);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .exh-cohort-cell.head {
    background: var(--accent);
    color: var(--bg);
    border-right: 1px solid color-mix(in srgb, var(--bg) 20%, transparent);
  }

  /* ── Exhibit 03: authentication funnel ── */
  .exh-auth-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .exh-auth-kpi {
    background: var(--bg);
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .exh-auth-kpi-k {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .exh-auth-kpi-row { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .exh-auth-kpi-v {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .exh-auth-kpi-r {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
  }

  .exh-auth-flow {
    display: flex; flex-direction: column; gap: 10px;
    padding: 16px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .exh-auth-flow-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .exh-auth-steps {
    display: flex; align-items: stretch; gap: 8px;
  }
  .exh-auth-step {
    flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0;
  }
  .exh-auth-screen {
    position: relative;
    aspect-ratio: 9 / 14;
    max-height: 180px;
    min-height: 120px;
    width: 100%;
    background: linear-gradient(180deg, var(--bg) 0%, var(--surface) 100%);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    overflow: hidden;
    display: flex; flex-direction: column; gap: 6px;
  }
  .exh-auth-screen .screen-bar {
    height: 3px; width: 40%; background: var(--accent); border-radius: 2px; opacity: .7;
  }
  .exh-auth-screen .screen-row {
    height: 4px; width: 86%; background: var(--ink-4); opacity: .35; border-radius: 2px;
  }
  .exh-auth-screen .screen-row.big { height: 10px; width: 70%; opacity: .55; }
  .exh-auth-screen .screen-row.short { width: 50%; opacity: .25; }
  .exh-auth-screen .screen-circle {
    width: 38%; aspect-ratio: 1; border: 1.5px dashed var(--accent-soft); border-radius: 999px;
    margin: 6px auto; opacity: .8;
  }
  .exh-auth-screen .screen-scan {
    width: 50%; aspect-ratio: 1; border: 1.5px solid var(--accent); border-radius: 8px;
    margin: 4px auto; position: relative; opacity: .75;
  }
  .exh-auth-screen .screen-scan::before {
    content: ""; position: absolute; left: 8%; right: 8%; top: 48%;
    border-top: 1.5px solid var(--accent);
  }
  .exh-auth-screen .screen-check {
    display: grid; place-items: center;
    width: 38%; aspect-ratio: 1; border-radius: 999px;
    background: var(--positive);
    color: var(--bg);
    font-weight: 700; font-size: 18px;
    margin: 6px auto;
  }
  .exh-auth-screen .screen-cta {
    margin-top: auto;
    height: 14px; background: var(--accent); border-radius: 6px; opacity: .85;
  }
  .exh-auth-step-cap {
    text-align: center;
    display: flex; flex-direction: column; gap: 1px;
  }
  .cap-i { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .cap-name { font-family: var(--font-display); font-size: 12px; font-weight: 500; color: var(--ink); }
  .cap-v { font-family: var(--font-mono); font-size: 13px; color: var(--accent); font-weight: 500; margin-top: 2px; }
  .cap-pct { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }

  .exh-auth-arrow {
    display: grid; place-items: center;
    color: var(--ink-4);
    font-size: 18px;
    width: 22px;
    align-self: center;
    padding-bottom: 36px;
  }

  .exh-auth-trends {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .exh-auth-trend {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    background: var(--bg);
  }
  .trend-head {
    display: flex; align-items: baseline; justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .trend-v { color: var(--ink); font-weight: 500; font-size: 13px; }

  /* ── Exhibit 04: KPI Tracker ── */
  .exh-kpi-head {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .exh-kpi-h {
    background: var(--bg);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .exh-kpi-h-k {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.02em;
  }
  .exh-kpi-h-v {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.05;
  }
  .exh-bu-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }
  .exh-bu {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
    min-width: 0;
  }
  .exh-bu-head {
    display: flex; flex-direction: column; gap: 2px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .exh-bu-name {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }
  .exh-bu-ach {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
  }
  .exh-bu-ach strong { color: var(--ink); font-weight: 500; }
  .exh-bu-mtd {
    display: flex; align-items: baseline; gap: 6px;
  }
  .exh-bu-mtd .k {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--ink-4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .exh-bu-mtd .v {
    font-family: var(--font-display);
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
  }
  .exh-bu-fc {
    display: flex; justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
  }
  .exh-bu-fc strong { color: var(--ink-2); font-weight: 500; }
  .exh-bu-bars {
    position: relative;
    margin-top: auto;
  }
  .exh-bu-target {
    position: absolute;
    left: 0; right: 0; top: 30%;
    border-top: 1px dashed var(--accent);
    opacity: 0.7;
    pointer-events: none;
  }

  /* ── Exhibit 05: User growth ── */
  .exh-growth-wrap {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 16px;
  }
  .exh-growth-tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .exh-growth-t {
    background: var(--bg);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .exh-growth-t .k {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
  }
  .exh-growth-t .vrow {
    display: flex; align-items: baseline; gap: 8px;
  }
  .exh-growth-t .v {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .exh-growth-sparks {
    display: flex; flex-direction: column; gap: 10px;
  }
  .exh-growth-spark {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    background: var(--bg);
  }
  .sp-head {
    display: flex; align-items: baseline; justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .sp-head em {
    font-family: var(--font-mono);
    font-style: normal;
    color: var(--ink-4);
    font-size: 10px;
  }
  .sp-v { color: var(--ink); font-weight: 500; font-size: 13px; }

  /* ── Dashboard / KPI views — mobile wrap fixes ── */
  /* Hero dashboard: keep KPI delta on one line, tighten title strip */
  .hd-kpi-delta { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hd-kpi-delta .vs { white-space: nowrap; }
  .hd-title { flex-wrap: wrap; }
  .hd-chart-head { gap: 8px; }
  .hd-chart-head .hd-chart-hint { text-align: right; }

  /* Exhibit tiles: never wrap the delta line */
  .exh-tile-d, .exh-tile-d span { white-space: nowrap; }
  .exh-tile-v, .exh-auth-kpi-v, .exh-kpi-h-v, .exh-bu-mtd .v, .exh-growth-t .v { white-space: nowrap; }
  .exh-bu-fc { flex-wrap: wrap; gap: 2px 8px; }
  .exh-growth-t .vrow { flex-wrap: wrap; gap: 2px 8px; }

  /* Frame chrome: keep status pill from being pushed; filters truncate gracefully */
  .df-chrome { row-gap: 6px; }
  .df-chrome-l { min-width: 0; flex: 1 1 auto; }
  .df-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .df-filter { white-space: nowrap; }

  /* ─ tablet / small desktop (≤ 900px) ─ */
  @media (max-width: 900px) {
    .exh-tile-grid, .exh-auth-grid { grid-template-columns: repeat(2, 1fr); }
    .exh-kpi-head { grid-template-columns: repeat(4, 1fr); }
    .exh-bu-grid { grid-template-columns: repeat(3, 1fr); }
    .exh-growth-wrap { grid-template-columns: 1fr; }
    .exh-cohort-wrap { grid-template-columns: 1fr; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
    .exh-cohort-wrap::after {
      content: "← scroll →";
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-3);
      text-align: center;
      padding: 8px 0 0;
      letter-spacing: 0.1em;
    }
    .exh-auth-trends { grid-template-columns: 1fr; }
  }

  /* ─ phone landscape / small tablet (≤ 600px) ─ */
  @media (max-width: 600px) {
    /* Keep 2-col where it makes sense; drop to 1 only where 2 would crush */
    .exh-tile-grid { grid-template-columns: repeat(2, 1fr); }
    .exh-auth-grid { grid-template-columns: repeat(2, 1fr); }
    .exh-kpi-head { grid-template-columns: repeat(2, 1fr); }
    .exh-bu-grid { grid-template-columns: repeat(2, 1fr); }
    .exh-growth-tiles { grid-template-columns: repeat(2, 1fr); }
    /* Trim tile typography so values like "1,996,010" don't overflow */
    .exh-tile { padding: 10px 12px; }
    .exh-tile-v { font-size: 18px; }
    .exh-tile-k, .exh-auth-kpi-k { font-size: 10px; }
    .exh-tile-d { font-size: 9.5px; gap: 4px; }
    .exh-auth-kpi { padding: 10px 12px; }
    .exh-auth-kpi-v { font-size: 17px; }
    .exh-kpi-h { padding: 8px 10px; }
    .exh-kpi-h-v { font-size: 15px; }
    .exh-bu { padding: 10px; }
    .exh-bu-name { font-size: 12px; }
    .exh-bu-mtd .v { font-size: 13.5px; }
    .exh-growth-t { padding: 8px 10px; }
    .exh-growth-t .v { font-size: 15px; }
    /* Frame chrome: tighten + truncate filters list */
    .df-chrome { padding: 8px 12px; }
    .df-title { font-size: 12px; }
    .df-status { font-size: 9.5px; }
    .df-filter { font-size: 9.5px; padding: 2px 6px; }
    .df-body { padding: 14px 12px; }
    /* Auth funnel: stack the 3 phone screens vertically; hide horizontal arrows */
    .exh-auth-steps { flex-direction: column; gap: 12px; }
    .exh-auth-arrow { transform: rotate(90deg); padding: 0; height: 16px; }
    .exh-auth-screen { aspect-ratio: 16/7; max-height: 110px; }
    .exh-auth-screen .screen-circle, .exh-auth-screen .screen-scan, .exh-auth-screen .screen-check {
      width: 18%; margin: 2px auto;
    }
    /* Cohort table: scroll horizontally with sticky cohort column for context */
    .exh-cohort-rowhead { position: sticky; left: 0; background: var(--surface); z-index: 1; border-right: 1px solid var(--border); }
    .exh-cohort-side { display: none; } /* filters panel — gain back the width */
    /* Dashboard exhibit caption: tighten */
    .dash-exhibit-cap h4 { font-size: 17px; }
    .dash-exhibit-cap p { font-size: 13px; }
  }

  /* ─ small phone (≤ 420px) ─ where 2-col still wraps numbers ─ */
  @media (max-width: 420px) {
    .exh-tile-v, .exh-auth-kpi-v, .exh-growth-t .v { font-size: 16px; }
    .exh-kpi-h-v { font-size: 14px; }
    .exh-bu-mtd .v { font-size: 12.5px; }
    .exh-bu-fc { font-size: 9.5px; }
    /* Hide the "vs prev. month" supporting text — keep just the delta arrow + % */
    .hd-kpi-delta .vs { display: none; }
    .exh-tile-d span:last-child { display: none; }
  }

  /* ═══════════════════════════════════════════════════════
     Project sheets 03/04/05 — ETL / Anomaly / SQL
     ═══════════════════════════════════════════════════════ */

  /* ── ETL pipeline diagram (sheet 03) ── */
  .etl-pipe {
    display: grid;
    grid-template-columns: 1fr 24px 1fr 24px 1fr 24px 1fr 24px 1fr 24px 1fr;
    align-items: stretch;
    margin-top: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 22px 20px;
    gap: 0;
  }
  .etl-stage {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    padding: 14px 12px 12px;
    display: flex; flex-direction: column; gap: 4px;
    text-align: left;
    transition: border-color .2s, box-shadow .2s, transform .2s;
  }
  .etl-stage:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px -16px color-mix(in srgb, var(--accent) 50%, transparent);
  }
  .etl-stage-glyph {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    display: grid; place-items: center;
    margin-bottom: 6px;
  }
  .etl-stage-name {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .etl-stage-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    line-height: 1.4;
  }
  .etl-conn {
    align-self: center;
    position: relative;
    height: 12px;
    color: var(--ink-4);
    overflow: visible;
  }
  .etl-conn svg { width: 100%; height: 100%; display: block; }
  .etl-dot {
    position: absolute;
    top: 50%; left: 0;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
    animation: etlDot 5s linear infinite;
    opacity: 0;
  }
  @keyframes etlDot {
    0%   { left: 0%;   opacity: 0; }
    8%   { opacity: 1; }
    50%  { left: 100%; opacity: 1; }
    58%  { opacity: 0; }
    100% { left: 100%; opacity: 0; }
  }
  @media (max-width: 820px) {
    .etl-pipe {
      grid-template-columns: 1fr;
      gap: 0;
      padding: 16px;
    }
    .etl-conn {
      width: 100%;
      height: 24px;
    }
    .etl-conn svg {
      transform: rotate(90deg);
      width: 24px;
      height: 100%;
      margin: 0 auto;
    }
    .etl-dot {
      top: 0; left: 50%;
      animation: etlDotV 5s linear infinite;
    }
    @keyframes etlDotV {
      0%   { top: 0%;   opacity: 0; }
      8%   { opacity: 1; }
      50%  { top: 100%; opacity: 1; }
      58%  { opacity: 0; }
      100% { top: 100%; opacity: 0; }
    }
  }

  /* ── ETL stage icon area + animation keyframes ── */
  .etl-stage-icon { width: 100%; flex-shrink: 0; margin-bottom: 6px; line-height: 0; }

  @keyframes etlSrcRow    { 0%,100%{opacity:.1}  50%{opacity:.85} }
  @keyframes etlFlowDash  { from{stroke-dashoffset:12} to{stroke-dashoffset:0} }
  @keyframes etlPulseOp   { 0%,100%{opacity:.15} 50%{opacity:.9}  }
  @keyframes etlMartRing  { 0%,100%{opacity:.04} 50%{opacity:.35} }
  @keyframes etlMartSpoke { 0%,30%{stroke-dashoffset:14;opacity:0} 60%,100%{stroke-dashoffset:0;opacity:.7} }
  @keyframes etlGearCW    { to{transform:rotate(360deg)}  }
  @keyframes etlGearCCW   { to{transform:rotate(-360deg)} }
  @keyframes etlFanItem   { 0%,25%{opacity:0} 55%,100%{opacity:1} }

  /* ── Anomaly detection chart (sheet 04) ── */
  .anom-chart {
    display: flex; flex-direction: column; gap: 14px;
    margin-top: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 22px;
  }
  .anom-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 18px;
    align-items: stretch;
  }
  .anom-label {
    display: flex; flex-direction: column; justify-content: center;
    border-right: 1px solid var(--border);
    padding-right: 18px;
  }
  .anom-label .k {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .anom-label .sub {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    margin-top: 4px;
  }
  .anom-svg {
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 10px 12px;
    overflow: visible;
  }
  .anom-svg.short { padding: 8px 12px; overflow: hidden; }
  .anom-svg svg { width: 100%; height: 110px; display: block; }
  .anom-svg.short svg { height: 70px; }
  /* Signal SVG sits inside a wrapper that hosts absolute callouts */
  .anom-svg-wrap { position: relative; width: 100%; }
  .anom-svg .anom-svg-wrap > svg { height: 100%; }

  /* Anomaly chart: keep strokes crisp under preserveAspectRatio="none" stretching */
  .anom-svg svg path,
  .anom-svg svg line,
  .anom-svg svg circle { vector-effect: non-scaling-stroke; }

  /* HTML overlay anomaly markers — stay round at every viewport width */
  .anom-marker {
    position: absolute;
    width: 14px; height: 14px;
    margin-left: -7px; margin-top: -7px;
    padding: 0;
    background: var(--bg);
    border: 1.4px solid var(--accent);
    border-radius: 50%;
    cursor: pointer;
    z-index: 1;
    transition: width .15s, height .15s, margin .15s, box-shadow .15s;
  }
  .anom-marker::before {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 50%;
  }
  .anom-marker::after {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--accent);
    transition: inset .15s;
  }
  .anom-marker.active {
    width: 18px; height: 18px;
    margin-left: -9px; margin-top: -9px;
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .anom-marker.active::after { inset: 4px; }
  .anom-marker:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  /* Matrix profile dots also stay round via inline SVG circles — those don't squish much given short height */

  /* Anomaly tooltip (appears on hover over a marker) */
  .anom-tooltip {
    position: absolute;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 7px 10px 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-2);
    line-height: 1.45;
    width: 200px;
    box-shadow: 0 10px 26px -12px color-mix(in srgb, var(--accent) 55%, transparent), 0 0 0 1px var(--bg);
    z-index: 3;
    letter-spacing: 0;
    pointer-events: none;
    transform: translateY(-50%);
    animation: anomTipIn .14s ease-out;
  }
  @keyframes anomTipIn { from { opacity: 0; transform: translateY(-50%) scale(.94); } to { opacity: 1; transform: translateY(-50%) scale(1); } }
  .anom-tooltip.left  { transform: translate(12px, -50%); }
  .anom-tooltip.right { transform: translate(calc(-100% - 12px), -50%); }
  .anom-tooltip.above.left  { transform: translate(12px, calc(-100% - 12px)); }
  .anom-tooltip.above.right { transform: translate(calc(-100% - 12px), calc(-100% - 12px)); }
  .anom-tooltip.below.left  { transform: translate(12px, 12px); }
  .anom-tooltip.below.right { transform: translate(calc(-100% - 12px), 12px); }
  .anom-tooltip-t {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: -0.005em;
  }
  .anom-tooltip-s { color: var(--ink-3); font-size: 9.5px; }
  .anom-tooltip-s strong { color: var(--ink); font-weight: 500; }

  /* Hover hint on the label sub-text */
  .anom-label .sub em { font-family: var(--font-serif); font-style: italic; color: var(--accent); }

  @media (max-width: 720px) {
    .anom-tooltip { width: 160px; font-size: 9px; padding: 6px 8px; }
    .anom-tooltip-t { font-size: 11px; }
    /* Less squished chart on mobile: a touch taller, thicker stroke */
    .anom-chart .anom-svg-wrap { height: 170px !important; }
    .anom-svg svg path { stroke-width: 1.6; }
    .anom-svg.short svg path { stroke-width: 1.3; }
  }

  .anom-domains {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 4px;
  }
  .anom-domain {
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 10px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .anom-domain-k {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
  }
  .anom-domain-v {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.4;
  }
  .anom-domain-s {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--accent);
    margin-top: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  @media (max-width: 720px) {
    .anom-row { grid-template-columns: 1fr; gap: 8px; }
    .anom-label { border-right: none; border-bottom: 1px solid var(--border); padding-right: 0; padding-bottom: 8px; }
    .anom-domains { grid-template-columns: 1fr; }
  }

  /* ── SQL before/after bars (sheet 05) ── */
  .sql-bars {
    margin-top: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .sql-bars-head {
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .sql-bars-head .sw {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    margin: 0 4px 0 10px;
    vertical-align: middle;
  }
  .sql-bars-head .sw.old { background: var(--ink-4); }
  .sql-bars-head .sw.new { background: var(--accent); }
  .sql-row {
    display: grid;
    grid-template-columns: 220px 1fr 60px;
    gap: 16px;
    align-items: center;
  }
  .sql-row-q {
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  .sql-row-bars {
    display: flex; flex-direction: column; gap: 4px;
  }
  .sql-bar {
    height: 16px;
    border-radius: 3px;
    position: relative;
    display: flex; align-items: center;
    padding: 0 6px;
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    min-width: 36px;
    transition: width .6s cubic-bezier(.2,.7,.2,1);
  }
  .sql-bar.old { background: var(--ink-4); color: var(--ink); }
  .sql-bar.new { background: var(--accent); color: var(--bg); }
  .sql-bar span { white-space: nowrap; }
  .sql-row-pct {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--positive);
    text-align: right;
    letter-spacing: -0.01em;
  }
  @media (max-width: 720px) {
    .sql-row { grid-template-columns: 1fr; gap: 4px; }
    .sql-row-pct { text-align: left; font-size: 15px; }
  }

  /* ── SQL code before/after ── */
  .sql-code {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 8px;
  }
  .sql-code-side {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: var(--surface);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .sql-code-h {
    padding: 10px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sql-code-side pre {
    margin: 0;
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--ink-2);
    background: var(--bg);
    overflow: auto;
    white-space: pre;
    flex: 1;
  }
  @media (max-width: 820px) {
    .sql-code { grid-template-columns: 1fr; }
    .sql-code-side pre { font-size: 11px; }
  }

  /* ── SQL techniques list ── */
  .sql-techs {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 4px;
  }
  .sql-tech {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 14px 14px 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .sql-tech-k {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.005em;
  }
  .sql-tech-v {
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.45;
  }
  @media (max-width: 900px) { .sql-techs { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .sql-techs { grid-template-columns: 1fr; } }

  /* Inline <code> inside sheet prose */
  .sheet-block p code {
    font-family: var(--font-mono);
    font-size: 12.5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--accent);
  }
  .sheet-quote {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 22px;
    line-height: 1.4;
    color: var(--ink);
    max-width: 720px;
    padding: 24px 0 4px;
    border-top: 1px solid var(--border);
  }
  .sheet-quote .who {
    display: block;
    font-family: var(--font-mono);
    font-style: normal;
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 14px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  @media (max-width: 720px) {
    .sheet-hero { padding: 56px 24px 32px; }
    .sheet-body { padding: 32px 24px; gap: 40px; }
    .findings { grid-template-columns: 1fr; }
    .sheet-impact { grid-template-columns: 1fr 1fr; gap: 0; }
    .sheet-impact .stat { padding: 16px; border-left: none; border-top: 1px solid var(--border); }
    .sheet-impact .stat:nth-child(-n+2) { border-top: none; }
    .sheet-impact .stat:nth-child(odd) { border-right: 1px solid var(--border); }
    .cohort-table { grid-template-columns: 80px repeat(10, 1fr); min-width: 520px; }
  }

  /* Radius variants */
  body[data-radius="sharp"] { --r-sm: 2px; --r: 4px; --r-lg: 6px; --r-xl: 10px; }
  body[data-radius="soft"] { --r-sm: 12px; --r: 18px; --r-lg: 24px; --r-xl: 32px; }

  /* Font family variants */
  body[data-headfont="serif"] { --font-display: "Instrument Serif", "Iowan Old Style", Georgia, serif; }
  body[data-headfont="serif"] .hero h1 em,
  body[data-headfont="serif"] .section-title em,
  body[data-headfont="serif"] .case h2 em,
  body[data-headfont="serif"] .contact-info h3 em { font-style: normal; }
  body[data-headfont="serif"] .hero h1,
  body[data-headfont="serif"] .section-title,
  body[data-headfont="serif"] .case h2,
  body[data-headfont="serif"] .contact-info h3 { letter-spacing: -0.02em; font-weight: 400; }

  /* Hero variants */
  body[data-hero="centered"] .hero-grid { grid-template-columns: 1fr; text-align: center; }
  body[data-hero="centered"] .hero-tagline,
  body[data-hero="centered"] .hero h1 { margin-left: auto; margin-right: auto; }
  body[data-hero="centered"] .hero-ctas { justify-content: center; }
  body[data-hero="centered"] .hero-visual-wrap { display: none; }
  body[data-hero="centered"] .hero-meta { justify-content: center; }

  body[data-hero="stacked"] .hero-grid { grid-template-columns: 1fr; }
  body[data-hero="stacked"] .hero-visual-wrap { margin-top: 40px; max-width: 600px; }

  /* Viz intensity — applies to the hero dashboard preview */
  body[data-viz="minimal"] .hv-chart-svg .area { opacity: 0.35; }
  body[data-viz="minimal"] .hv-bd-row .bar::after { background: var(--accent); }
  body[data-viz="bold"] .hv-chart-svg .area { opacity: 1; }
  body[data-viz="bold"] .hv-chart-svg .line { stroke-width: 2.4; }

  /* RESPONSIVE */
  @media (max-width: 960px) {
    .hero-grid { grid-template-columns: 1fr; gap: 48px; }
    .about-grid { grid-template-columns: 1fr; gap: 40px; }
    .contact-grid { grid-template-columns: 1fr; gap: 40px; }
    .case-grid { grid-template-columns: 1fr 1fr; }
    .case-impact { grid-template-columns: 1fr 1fr; gap: 24px; }
    .case-impact .stat { padding: 16px 0 0; border-left: none; border-top: 1px solid color-mix(in srgb, var(--bg) 14%, transparent); }
    .case-impact .stat:first-child { border-top: none; padding-top: 0; }
  }
  @media (max-width: 680px) {
    .projects-grid, .certs-grid, .about-highlights { grid-template-columns: 1fr; }
    .case-grid { grid-template-columns: 1fr; }
    .pipeline { grid-template-columns: 1fr; gap: 4px; }
    .pipe-arrow { transform: rotate(90deg); padding: 4px 0; }
    .hero h1 { font-size: clamp(40px, 11vw, 60px); }
    .section-title { font-size: clamp(30px, 8vw, 40px); }
    .contact-form .row { grid-template-columns: 1fr; }
    .hero-meta { font-size: 11.5px; gap: 14px; }
    .nav-inner { height: 56px; }
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    .reveal { opacity: 1; transform: none; }
  }
</style>
</head>
